<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin CMS | Zion Uniforms</title>
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#f8fafc;color:#111827}
    header{display:flex;justify-content:space-between;align-items:center;background:#1e3a5f;color:#fff;padding:14px 20px}
    .layout{max-width:1100px;margin:20px auto;padding:0 16px}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
    .tab-btn{background:#e2e8f0;border:none;padding:10px 14px;border-radius:8px;cursor:pointer}
    .tab-btn.active{background:#1e3a5f;color:#fff}
    .tab-content{background:#fff;padding:16px;border-radius:12px;box-shadow:0 6px 18px rgba(15,23,42,.08)}
    .hidden{display:none}
    form{display:grid;gap:8px;margin-bottom:16px}
    input,textarea,select,button{padding:10px;border-radius:8px;border:1px solid #cbd5e1;font-size:14px}
    button{cursor:pointer;background:#1e3a5f;color:#fff;border:none}
    button.danger{background:#b91c1c}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px;border-bottom:1px solid #e5e7eb;text-align:left;font-size:14px;vertical-align:top}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .feedback{margin:10px 0;padding:10px;border-radius:8px;font-size:13px}
    .feedback.info{background:#e0f2fe;color:#075985}
    .feedback.success{background:#dcfce7;color:#166534}
    .feedback.error{background:#fee2e2;color:#991b1b}
    ul{list-style:none;padding:0;margin:0;display:grid;gap:8px}
    .list-item{padding:10px;border:1px solid #e5e7eb;border-radius:8px;display:flex;justify-content:space-between;gap:10px;align-items:center}
  </style>
</head>
<body>
  <header>
    <strong>Zion Uniforms CMS</strong>
    <button id="logoutBtn" class="danger">Sair</button>
  </header>

  <main class="layout">
    <div class="tabs">
      <button class="tab-btn active" data-tab-target="tab-content">Conteúdo</button>
      <button class="tab-btn" data-tab-target="tab-partners">Parceiros</button>
      <button class="tab-btn" data-tab-target="tab-users">Usuários</button>
    </div>

    <section id="tab-content" class="tab-content">
      <h2>Gerenciar conteúdo da landing page</h2>
      <form id="contentForm" data-mode="create">
        <input name="key" placeholder="Chave (ex.: hero_title)" required>
        <textarea name="value" rows="4" placeholder="Valor do conteúdo" required></textarea>
        <button type="submit">Salvar conteúdo</button>
      </form>

      <form id="imageUploadForm">
        <label>Upload de imagem (campo imageFile)</label>
        <input type="file" name="imageFile" accept="image/*" required>
        <button type="submit">Enviar imagem</button>
      </form>

      <div id="contentStatus" class="feedback info">Carregando conteúdo...</div>
      <table>
        <thead>
          <tr><th>Chave</th><th>Valor</th><th>Ações</th></tr>
        </thead>
        <tbody id="contentTableBody"></tbody>
      </table>
    </section>

    <section id="tab-partners" class="tab-content hidden">
      <h2>Gerenciar parceiros</h2>
      <form id="partnerForm">
        <input name="name" placeholder="Nome do parceiro" required>
        <input name="website" placeholder="Site (opcional)">
        <input type="file" name="logoFile" accept="image/*" required>
        <button type="submit">Cadastrar parceiro</button>
      </form>
      <div id="partnerStatus" class="feedback info">Carregando parceiros...</div>
      <ul id="partnerList"></ul>
    </section>

    <section id="tab-users" class="tab-content hidden">
      <h2>Gerenciar usuários</h2>
      <form id="userForm">
        <input type="hidden" name="userId">
        <input name="name" placeholder="Nome" required>
        <input name="email" type="email" placeholder="Email" required>
        <input name="password" type="password" placeholder="Senha (somente para criar/alterar)">
        <select name="role">
          <option value="admin">admin</option>
          <option value="editor">editor</option>
        </select>
        <button type="submit">Salvar usuário</button>
      </form>
      <div id="userStatus" class="feedback info">Carregando usuários...</div>
      <ul id="userList"></ul>
    </section>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
