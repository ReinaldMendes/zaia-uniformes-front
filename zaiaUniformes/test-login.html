<!DOCTYPE html>
<html>
<head>
    <title>Teste Login</title>
</head>
<body>
    <h1>Teste de Login</h1>
    <button onclick="testLogin()">Testar Login</button>
    <div id="result"></div>

    <script src="admin/api.js"></script>
    <script>
        async function testLogin() {
            try {
                const result = await login('admin@example.com', 'admin123');
                document.getElementById('result').innerHTML = `
                    <h2>Login bem-sucedido!</h2>
                    <p>Token: ${result.token ? 'Presente' : 'Ausente'}</p>
                    <p>User: ${JSON.stringify(result.user)}</p>
                    <p>Role: ${result.user?.role}</p>
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = `
                    <h2>Erro no login:</h2>
                    <p>${error.message}</p>
                `;
            }
        }
    </script>
</body>
</html>
