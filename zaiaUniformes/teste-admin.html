<!DOCTYPE html>
<html>
<head>
    <title>Teste Admin</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .debug { background: #f0f0f0; padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Teste de Detecção Admin</h1>

    <div class="debug">
        <h3>Status do Sistema:</h3>
        <div id="status"></div>
    </div>

    <div class="debug">
        <h3>localStorage:</h3>
        <div id="storage"></div>
    </div>

    <button onclick="forceAdmin()">Forçar Admin</button>
    <button onclick="testLogin()">Testar Login</button>
    <button onclick="clearStorage()">Limpar Storage</button>
    <button onclick="checkAdmin()">Verificar Admin</button>

    <script src="admin/api.js"></script>
    <script src="admin/auth.js"></script>
    <script src="js/dynamic-content-loader.js"></script>

    <script>
        function updateStatus() {
            const status = document.getElementById('status');
            const token = getToken();
            const role = getUserRole();
            const isAdminCheck = isAdmin();

            status.innerHTML = `
                <p><strong>Token presente:</strong> ${token ? '✅ Sim' : '❌ Não'}</p>
                <p><strong>Role:</strong> ${role || 'Nenhum'}</p>
                <p><strong>É admin:</strong> ${isAdminCheck ? '✅ Sim' : '❌ Não'}</p>
                <p><strong>BASE_PATH:</strong> ${typeof BASE_PATH !== 'undefined' ? BASE_PATH : '❌ Não definido'}</p>
            `;

            status.className = isAdminCheck ? 'debug success' : 'debug error';
        }

        function updateStorage() {
            const storage = document.getElementById('storage');
            const items = {};
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                items[key] = localStorage.getItem(key);
            }
            storage.innerHTML = '<pre>' + JSON.stringify(items, null, 2) + '</pre>';
        }

        function forceAdmin() {
            localStorage.setItem('authToken', 'fake-token-for-testing');
            localStorage.setItem('userRole', 'ADMIN');
            updateStatus();
            updateStorage();
            alert('Admin forçado! Agora recarregue a página principal.');
        }

        function clearStorage() {
            localStorage.clear();
            updateStatus();
            updateStorage();
            alert('localStorage limpo!');
        }

        function checkAdmin() {
            updateStatus();
            updateStorage();
        }

        // Inicializar
        document.addEventListener('DOMContentLoaded', () => {
            updateStatus();
            updateStorage();
        });
    </script>
</body>
</html>
